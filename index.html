<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Magic Circle Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
  <script>

  const CHARACTERS = [
    {
      id: 'agi',
      name: 'アギ',
      attr: '炎',
      color: 0xe94560,
      textColor: '#e94560',
      emoji: '🔥',
      desc: '速さボーナス 最大3倍',
    },
    {
      id: 'rai',
      name: 'ライ',
      attr: '雷',
      color: 0xffdd00,
      textColor: '#ffdd00',
      emoji: '⚡',
      desc: '高精度でダメージ増加',
    },
    {
      id: 'fio',
      name: 'フィオ',
      attr: '氷',
      color: 0x44aaff,
      textColor: '#44aaff',
      emoji: '❄️',
      desc: '禁呪発動率 50%',
    },
  ];

  // ============================
  //  CharSelectScene: キャラ選択
  // ============================
  class CharSelectScene extends Phaser.Scene {
    constructor() { super('CharSelectScene'); }

    create() {
      const W = this.scale.width;
      const H = this.scale.height;

      this.add.rectangle(W / 2, H / 2, W, H, 0x0f0f23);

      this.add.text(W / 2, 55, 'キャラクター選択', {
        fontSize: '20px', color: '#ffffff', letterSpacing: 2
      }).setOrigin(0.5);

      this.add.text(W / 2, 85, '魔法使いを選べ', {
        fontSize: '13px', color: '#666688'
      }).setOrigin(0.5);

      const startY = 180;
      const cardH  = 130;
      const cardW  = W - 60;

      CHARACTERS.forEach((char, i) => {
        const cy = startY + i * (cardH + 20);

        const bg = this.add.rectangle(W / 2, cy, cardW, cardH, 0x1a1a3a)
          .setInteractive();
        const border = this.add.rectangle(W / 2, cy, cardW, cardH)
          .setStrokeStyle(2, char.color, 0.8);

        this.add.text(W / 2 - cardW / 2 + 44, cy, char.emoji, {
          fontSize: '36px'
        }).setOrigin(0.5);

        this.add.text(W / 2 - 10, cy - 22, char.name, {
          fontSize: '22px', color: char.textColor, fontStyle: 'bold'
        }).setOrigin(0, 0.5);

        this.add.text(W / 2 - 10, cy + 8, '属性：' + char.attr, {
          fontSize: '14px', color: '#aaaacc'
        }).setOrigin(0, 0.5);

        this.add.text(W / 2 - 10, cy + 32, char.desc, {
          fontSize: '12px', color: '#666688'
        }).setOrigin(0, 0.5);

        bg.on('pointerdown', () => {
          this.scene.start('BattleScene', { character: char });
        });
        bg.on('pointerover', () => {
          border.setStrokeStyle(3, char.color, 1.0);
          bg.setFillStyle(0x2a2a4a);
        });
        bg.on('pointerout', () => {
          border.setStrokeStyle(2, char.color, 0.8);
          bg.setFillStyle(0x1a1a3a);
        });
      });
    }
  }

  // ============================
  //  BattleScene: メインゲーム
  // ============================
  class BattleScene extends Phaser.Scene {
    constructor() { super('BattleScene'); }

    create(data) {
      const W = this.scale.width;
      const H = this.scale.height;
      this.W = W; this.H = H;

      this.character = data.character || CHARACTERS[0];

      this.bossMaxHP = 300;
      this.bossHP    = 300;
      this.round     = 1;
      this.maxRounds = 3;

      this.add.rectangle(W / 2, H / 2, W, H, 0x0f0f23);

      this.add.text(W / 2, 20, 'MAGIC CIRCLE', {
        fontSize: '18px', color: this.character.textColor, letterSpacing: 4
      }).setOrigin(0.5);

      this.add.text(W / 2, 42, this.character.emoji + ' ' + this.character.name + '（' + this.character.attr + '）', {
        fontSize: '13px', color: this.character.textColor
      }).setOrigin(0.5);

      this.add.text(W / 2, 62, '💀 ダークドラゴン', {
        fontSize: '16px', color: '#ffaa44'
      }).setOrigin(0.5);

      this.add.rectangle(W / 2, 82, W - 40, 14, 0x333333).setOrigin(0.5);
      this.hpBar  = this.add.rectangle(W / 2, 82, W - 40, 14, 0xe94560).setOrigin(0.5);
      this.hpText = this.add.text(W / 2, 82, 'HP ' + this.bossHP + ' / ' + this.bossMaxHP, {
        fontSize: '10px', color: '#ffffff'
      }).setOrigin(0.5);

      this.roundText = this.add.text(W / 2, 100, '第 ' + this.round + ' ラウンド', {
        fontSize: '13px', color: '#8888cc'
      }).setOrigin(0.5);

      this.targetX = W / 2;
      this.targetY = H / 2 + 20;
      this.targetR = 110;

      this.guideGfx = this.add.graphics();
      this.traceGfx = this.add.graphics();
      this.glowGfx  = this.add.graphics();

      this.drawGuide();

      this.resultText = this.add.text(W / 2, H - 130, '', {
        fontSize: '26px', color: '#ffffff', align: 'center'
      }).setOrigin(0.5);

      this.powerText = this.add.text(W / 2, H - 80, '', {
        fontSize: '18px', color: '#ffdd00', align: 'center'
      }).setOrigin(0.5);

      this.hintText = this.add.text(W / 2, H - 45, '円を描け！！', {
        fontSize: '13px', color: '#666688'
      }).setOrigin(0.5);

      this.timerText = this.add.text(W - 20, H - 45, '', {
        fontSize: '12px', color: '#aaaaaa'
      }).setOrigin(1, 0.5);

      this.tracePoints = [];
      this.drawing     = false;
      this.drawStart   = 0;
      this.waitingNext = false;

      this.input.on('pointerdown', (p) => {
        if (this.waitingNext) return;
        this.tracePoints = [];
        this.traceGfx.clear();
        this.glowGfx.clear();
        this.resultText.setText('');
        this.powerText.setText('');
        this.hintText.setText('');
        this.drawing   = true;
        this.drawStart = this.time.now;
      });

      this.input.on('pointermove', (p) => {
        if (!this.drawing) return;
        this.tracePoints.push({ x: p.x, y: p.y });
        this.redrawTrace();
        const elapsed = ((this.time.now - this.drawStart) / 1000).toFixed(1);
        this.timerText.setText(elapsed + 's');
      });

      this.input.on('pointerup', () => {
        if (!this.drawing) return;
        this.drawing = false;
        this.timerText.setText('');
        if (this.tracePoints.length > 10) {
          this.calcAndApply();
        }
      });
    }

    drawGuide() {
      this.guideGfx.clear();
      const c = this.character.color;
      this.guideGfx.lineStyle(16, c, 0.2);
      this.guideGfx.strokeCircle(this.targetX, this.targetY, this.targetR);
      const segs = 24;
      for (let i = 0; i < segs; i += 2) {
        const s = (i / segs) * Math.PI * 2 - Math.PI / 2;
        const e = ((i + 0.85) / segs) * Math.PI * 2 - Math.PI / 2;
        this.guideGfx.lineStyle(2, c, 0.8);
        this.guideGfx.beginPath();
        this.guideGfx.arc(this.targetX, this.targetY, this.targetR, s, e);
        this.guideGfx.strokePath();
      }
      this.guideGfx.fillStyle(c, 0.4);
      this.guideGfx.fillCircle(this.targetX, this.targetY, 5);
    }

    redrawTrace() {
      this.traceGfx.clear();
      if (this.tracePoints.length < 2) return;
      this.traceGfx.lineStyle(3, this.character.color, 1);
      this.traceGfx.beginPath();
      this.traceGfx.moveTo(this.tracePoints[0].x, this.tracePoints[0].y);
      for (let i = 1; i < this.tracePoints.length; i++) {
        this.traceGfx.lineTo(this.tracePoints[i].x, this.tracePoints[i].y);
      }
      this.traceGfx.strokePath();
    }

    calcAndApply() {
      const elapsed = (this.time.now - this.drawStart) / 1000;
      const char    = this.character;

      let totalDev = 0;
      this.tracePoints.forEach(p => {
        const d = Phaser.Math.Distance.Between(p.x, p.y, this.targetX, this.targetY);
        totalDev += Math.abs(d - this.targetR);
      });
      const avgDev   = totalDev / this.tracePoints.length;
      const accuracy = Math.max(0, Math.round(100 - (avgDev / 40) * 100));

      const speedCap  = char.id === 'agi' ? 3.0 : 2.0;
      const speedMult = Math.max(0.5, Math.min(speedCap, 3.0 / elapsed)).toFixed(2);

      const forbiddenRate = char.id === 'fio' ? 0.5 : 0.3;
      const isForbidden   = accuracy < 30 && Math.random() < forbiddenRate;

      let rank, color, damage;
      if (isForbidden) {
        rank   = '💀 禁呪発動！';
        color  = char.textColor;
        damage = Math.floor(Math.random() * 150 + 100);
      } else if (accuracy >= 90) {
        rank   = 'PERFECT!!'; color = '#ffdd00';
        damage = Math.floor(accuracy * speedMult * (char.id === 'rai' ? 1.2 : 1.0));
      } else if (accuracy >= 75) {
        rank   = 'GREAT!';    color = '#44eeaa';
        damage = Math.floor(accuracy * speedMult * (char.id === 'rai' ? 1.0 : 0.8));
      } else if (accuracy >= 55) {
        rank   = 'GOOD';      color = '#4488ff';
        damage = Math.floor(accuracy * speedMult * 0.5);
      } else if (accuracy >= 30) {
        rank   = 'MISS...';   color = '#aaaaaa';
        damage = Math.floor(accuracy * speedMult * 0.2);
      } else {
        rank   = 'FAIL';      color = '#555555';
        damage = 0;
      }

      this.resultText.setText(rank);
      this.resultText.setStyle({ color, fontSize: '26px' });

      if (isForbidden) {
        this.powerText.setText(char.attr + 'の禁呪  ダメージ ' + damage + '!!');
      } else {
        this.powerText.setText('精度 ' + accuracy + '%  ×  速さ ' + speedMult + '  =  ' + damage);
      }

      this.flashGlow(damage, isForbidden);

      this.bossHP = Math.max(0, this.bossHP - damage);
      this.updateHPBar();

      this.waitingNext = true;

      this.time.delayedCall(1800, () => {
        this.waitingNext = false;
        if (this.bossHP <= 0) {
          this.bossDefeated();
        } else if (this.round >= this.maxRounds) {
          this.roundEnd();
        } else {
          this.round++;
          this.roundText.setText('第 ' + this.round + ' ラウンド');
          this.traceGfx.clear();
          this.glowGfx.clear();
          this.resultText.setText('');
          this.powerText.setText('');
          this.hintText.setText('円を描け！！');
          this.drawGuide();
        }
      });
    }

    flashGlow(damage, forbidden) {
      this.glowGfx.clear();
      const alpha = Math.min(0.8, damage / 150);
      this.glowGfx.fillStyle(this.character.color, alpha);
      this.glowGfx.fillCircle(this.targetX, this.targetY, this.targetR + 20);
      this.tweens.add({
        targets: this.glowGfx,
        alpha: 0,
        duration: 600,
        onComplete: () => { this.glowGfx.clear(); this.glowGfx.setAlpha(1); }
      });
    }

    updateHPBar() {
      const ratio = this.bossHP / this.bossMaxHP;
      const maxW  = this.W - 40;
      this.hpBar.width = maxW * ratio;
      this.hpBar.x     = 20 + (maxW * ratio) / 2;
      this.hpText.setText('HP ' + this.bossHP + ' / ' + this.bossMaxHP);
      if (ratio < 0.3) this.hpBar.setFillStyle(0xff6600);
    }

    bossDefeated() {
      this.resultText.setText('👑 ボス討伐！');
      this.resultText.setStyle({ color: '#ffdd00', fontSize: '30px' });
      this.powerText.setText('タップでキャラ選択へ');
      this.hintText.setText('');
      this.input.once('pointerdown', () => this.scene.start('CharSelectScene'));
    }

    roundEnd() {
      this.resultText.setText('ラウンド終了...');
      this.resultText.setStyle({ color: '#8888cc', fontSize: '22px' });
      this.powerText.setText('残りHP: ' + this.bossHP + '\nタップでキャラ選択へ');
      this.hintText.setText('');
      this.input.once('pointerdown', () => this.scene.start('CharSelectScene'));
    }
  }

  // ============================
  const config = {
    type: Phaser.AUTO,
    backgroundColor: '#0f0f23',
    scale: {
      mode: Phaser.Scale.FIT,
      autoCenter: Phaser.Scale.CENTER_BOTH,
      width: 390,
      height: 700
    },
    scene: [CharSelectScene, BattleScene],
    input: { activePointers: 2 }
  };

  new Phaser.Game(config);
  </script>
</body>
</html>
