<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Magic Circle Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
  <script>
    class DrawScene extends Phaser.Scene {
      constructor() { super('DrawScene'); }

      create() {
        const W = this.scale.width;
        const H = this.scale.height;

        // 背景
        this.add.rectangle(W / 2, H / 2, W, H, 0x0f0f23);

        // タイトル
        this.add.text(W / 2, 28, 'MAGIC CIRCLE', {
          fontSize: '20px', color: '#e94560', letterSpacing: 4
        }).setOrigin(0.5);

        // ヒント
        this.hintText = this.add.text(W / 2, 58, 'ドラッグして魔法陣を描け', {
          fontSize: '13px', color: '#888888'
        }).setOrigin(0.5);

        // 描画用グラフィックス
        this.drawGraphics = this.add.graphics();
        this.previewGraphics = this.add.graphics();

        this.drawing = false;
        this.startX = 0;
        this.startY = 0;
        this.circles = [];

        // 入力
        this.input.on('pointerdown', (p) => {
          this.drawing = true;
          this.startX = p.x;
          this.startY = p.y;
          this.hintText.setText('');
        });

        this.input.on('pointermove', (p) => {
          if (!this.drawing) return;
          const r = Phaser.Math.Distance.Between(this.startX, this.startY, p.x, p.y);
          this.previewGraphics.clear();
          this.previewGraphics.lineStyle(3, 0xe94560, 0.6);
          this.previewGraphics.strokeCircle(this.startX, this.startY, r);
        });

        this.input.on('pointerup', (p) => {
          if (!this.drawing) return;
          this.drawing = false;
          const r = Phaser.Math.Distance.Between(this.startX, this.startY, p.x, p.y);
          this.previewGraphics.clear();

          if (r > 10) {
            this.circles.push({ x: this.startX, y: this.startY, r });
            this.redrawAll();
          }
        });

        // クリアボタン
        const btn = this.add.text(W / 2, H - 30, '[ クリア ]', {
          fontSize: '16px', color: '#e94560'
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });

        btn.on('pointerdown', () => {
          this.circles = [];
          this.drawGraphics.clear();
          this.hintText.setText('ドラッグして魔法陣を描け');
        });
      }

      redrawAll() {
        this.drawGraphics.clear();
        this.circles.forEach(c => {
          this.drawGraphics.lineStyle(3, 0xe94560, 1);
          this.drawGraphics.strokeCircle(c.x, c.y, c.r);
        });
      }
    }

    const config = {
      type: Phaser.AUTO,
      backgroundColor: '#0f0f23',
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 390,
        height: 700
      },
      scene: DrawScene,
      input: { activePointers: 2 }
    };

    new Phaser.Game(config);
  </script>
</body>
</html>
